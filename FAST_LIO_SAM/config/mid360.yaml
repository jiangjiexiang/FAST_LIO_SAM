common:
    # NOTE:
    # This code path (lidar_type: 1) subscribes livox_ros_driver/CustomMsg.
    # Ensure your driver publishes CustomMsg on this topic.
    lid_topic:  "/livox/lidar"
    imu_topic:  "/livox/imu"
    gnss_topic: /gps/fix
    time_sync_en: false         # ONLY turn on when external time synchronization is really not possible

preprocess:
    lidar_type: 1               # 1: Livox serials (CustomMsg)
    scan_line: 6
    blind: 1.0

mapping:
    acc_cov: 0.1
    gyr_cov: 0.1
    b_acc_cov: 0.0001
    b_gyr_cov: 0.0001
    # Internal code clamps effective FOV <= 179.9 deg.
    fov_degree:    100
    det_range:     120.0
    extrinsic_est_en:  false
    # Replace with your calibrated LiDAR-in-IMU extrinsic.
    extrinsic_T: [ 0.0, 0.0, 0.0 ]
    extrinsic_R: [ 1, 0, 0,
                   0, 1, 0,
                   0, 0, 1 ]

    extrinT_Gnss2Lidar: [ 0, 0, 0 ]
    extrinR_Gnss2Lidar: [ 1, 0, 0,
                          0, 1, 0,
                          0, 0, 1 ]

publish:
    path_en:  true
    scan_publish_en:  true
    dense_publish_en: true
    scan_bodyframe_pub_en: true

pcd_save:
    pcd_save_en: true
    interval: -1

# voxel filter params
odometrySurfLeafSize: 0.2
mappingCornerLeafSize: 0.1
mappingSurfLeafSize: 0.2

# robot motion constraint
z_tollerance: 1000
rotation_tollerance: 1000

# CPU params
numberOfCores: 4
mappingProcessInterval: 0.15

# Surrounding map
surroundingkeyframeAddingDistThreshold: 1.0
surroundingkeyframeAddingAngleThreshold: 0.2
surroundingKeyframeDensity: 2.0
surroundingKeyframeSearchRadius: 50.0

# Loop closure
loopClosureEnableFlag: true
loopClosureFrequency: 4.0
surroundingKeyframeSize: 50
historyKeyframeSearchRadius: 10.0
historyKeyframeSearchTimeDiff: 30.0
historyKeyframeSearchNum: 20
historyKeyframeFitnessScore: 0.3
loopClosureWeight: 4.0

# GPS settings
useImuHeadingInitialization: false
useGpsElevation: false
gpsCovThreshold: 2.0
poseCovThreshold: 0

# Visualization
globalMapVisualizationSearchRadius: 100.0
globalMapVisualizationPoseDensity: 10
globalMapVisualizationLeafSize: 1.0
visulize_IkdtreeMap: true
recontructKdTree: true

# Export settings
savePCD: true
savePCDDirectory: "/fast_lio_sam_ws/src/FAST_LIO_SAM/PCD/"
